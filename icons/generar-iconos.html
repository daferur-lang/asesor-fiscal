<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Generar iconos PNG</title>
  <style>
    body { font-family: sans-serif; padding: 24px; max-width: 480px; }
    button { padding: 10px 20px; background: #2563eb; color: white;
             border: none; border-radius: 8px; cursor: pointer; margin: 6px; font-size: 1rem; }
    canvas { display: block; margin: 12px 0; border-radius: 12px; }
    p { color: #475569; font-size: 0.9rem; margin-bottom: 16px; }
    code { background: #f1f5f9; padding: 2px 6px; border-radius: 4px; font-size: 0.85rem; }
  </style>
</head>
<body>
  <h2>Generador de iconos PNG</h2>
  <p>Abre este archivo en el navegador, pulsa los botones y descarga los PNG.<br>
     Coloca los archivos descargados en esta carpeta (<code>icons/</code>).</p>
  <button onclick="generar(192)">Descargar icon-192.png</button>
  <button onclick="generar(512)">Descargar icon-512.png</button>
  <canvas id="preview" width="192" height="192"></canvas>
  <script>
    function dibujar(canvas, size) {
      const ctx = canvas.getContext('2d');
      canvas.width = size; canvas.height = size;
      const r = size * 0.22;
      // Fondo
      const grad = ctx.createLinearGradient(0, 0, size, size);
      grad.addColorStop(0, '#1e3a5f');
      grad.addColorStop(1, '#0f2440');
      ctx.beginPath();
      ctx.moveTo(r, 0);
      ctx.lineTo(size - r, 0);
      ctx.quadraticCurveTo(size, 0, size, r);
      ctx.lineTo(size, size - r);
      ctx.quadraticCurveTo(size, size, size - r, size);
      ctx.lineTo(r, size);
      ctx.quadraticCurveTo(0, size, 0, size - r);
      ctx.lineTo(0, r);
      ctx.quadraticCurveTo(0, 0, r, 0);
      ctx.closePath();
      ctx.fillStyle = grad;
      ctx.fill();
      // Euro
      ctx.font = `bold ${size * 0.52}px Arial`;
      ctx.fillStyle = 'white';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'alphabetic';
      ctx.fillText('€', size * 0.46, size * 0.72);
      // Badge verde
      ctx.beginPath();
      ctx.arc(size * 0.77, size * 0.30, size * 0.155, 0, Math.PI * 2);
      ctx.fillStyle = '#10b981';
      ctx.fill();
      // Check
      const s = size * 0.155 * 0.55;
      const cx = size * 0.77, cy = size * 0.30;
      ctx.beginPath();
      ctx.moveTo(cx - s, cy);
      ctx.lineTo(cx - s * 0.1, cy + s * 0.9);
      ctx.lineTo(cx + s, cy - s * 0.85);
      ctx.strokeStyle = 'white';
      ctx.lineWidth = size * 0.025;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.stroke();
    }
    function generar(size) {
      const canvas = document.createElement('canvas');
      dibujar(canvas, size);
      const a = document.createElement('a');
      a.download = `icon-${size}.png`;
      a.href = canvas.toDataURL('image/png');
      a.click();
    }
    // Preview
    dibujar(document.getElementById('preview'), 192);
  </script>
</body>
</html>
